<header class="app-header no-print">
    <div class="app-header-inner">
        <a class="brand" routerLink="/" (click)="closeMobileMenu()">
            <span class="brand-mark">GP</span>
            <span class="brand-name">GradePath</span>
        </a>

        <nav class="main-nav" [class.open]="mobileMenuOpen()">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()">Calculator</a>
            <a routerLink="/history" routerLinkActive="active" (click)="closeMobileMenu()">History</a>
            <a routerLink="/goals" routerLinkActive="active" (click)="closeMobileMenu()">Goal Tracker</a>
        </nav>

        <div class="header-actions">
            <button
                type="button"
                class="btn btn-icon theme-toggle"
                (click)="theme.toggle()"
                [attr.aria-label]="theme.resolvedTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
            >
                {{ theme.resolvedTheme() === 'dark' ? '☀️' : '🌙' }}
            </button>
            <button
                type="button"
                class="btn btn-icon menu-toggle"
                (click)="toggleMobileMenu()"
                [attr.aria-expanded]="mobileMenuOpen()"
                aria-label="Toggle navigation menu"
            >
                ☰
            </button>
        </div>
    </div>
</header>

<main>
    <router-outlet></router-outlet>
</main>

<app-toast></app-toast>
